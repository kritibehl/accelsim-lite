name: CAD Flow CI

on:
  push:
  pull_request:

jobs:
  cad-flow:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install open-source CAD tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator iverilog yosys python3

      - name: Run CAD flow regression
        run: python3 cad_flow/scripts/run_regression.py

      - name: Archive CAD reports
        uses: actions/upload-artifact@v4
        with:
          name: cad-flow-reports
          path: |
            cad_flow/reports/*.md
            cad_flow/reports/*.json
