name: C++ Quality Gate

on:
  push:
  pull_request:

jobs:
  build-test-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Run benchmarks
        run: make benchmark

      - name: Generate dashboard
        run: make dashboard
